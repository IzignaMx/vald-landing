<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VALD — Ediciones Anteriores</title>
  <meta name="description" content="Archivo histórico de todas las ediciones de VALD — El Rey de la Montaña. Ciclismo de montaña en México.">
  <meta name="robots" content="index, follow">
  <meta name="language" content="es-MX">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="canonical" href="https://vald.izignamx.com/ediciones/" />
  <meta property="og:title" content="VALD — Ediciones Anteriores">
  <meta property="og:description" content="Archivo histórico de todas las ediciones de VALD — El Rey de la Montaña.">
  <meta property="og:image" content="https://vald.izignamx.com/vald.jpg">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#120B03">
  <style>
    /* ============================================
       VALD Editions Index
       ============================================ */
    :root {
      --bg: #0D0907;
      --bg-card: rgba(42, 32, 20, 0.7);
      --parchment: #F5E6C8;
      --fire-orange: #E85D26;
      --fire-red: #C0392B;
      --terracotta: #A0522D;
      --sun-gold: #FFD700;
      --text-light: #D4BB97;
      --text-muted: #B49574;
      --accent: #00D4FF;
      --gradient: linear-gradient(135deg, #E85D26 0%, #B83400 50%, #A02E00 100%);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-muted);
      line-height: 1.6;
      font-size: clamp(16px, 1.2vw, 18px);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: var(--fire-orange); text-underline-offset: 3px; transition: color 0.3s ease; }
    a:hover { color: var(--accent); }
    img { max-width: 100%; height: auto; display: block; }

    /* --- Header --- */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(13, 9, 7, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(232, 93, 38, 0.15);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .top-bar-logo {
      height: 36px;
      width: auto;
      filter: brightness(0.85);
      transition: filter 0.3s ease;
    }
    .top-bar-logo:hover { filter: brightness(1.1); }
    .top-bar-nav { display: flex; gap: 1rem; align-items: center; }
    .top-bar-nav a {
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      transition: all 0.3s ease;
    }
    .top-bar-nav a:hover {
      background: rgba(232, 93, 38, 0.1);
    }
    .top-bar-nav .btn-current {
      background: var(--gradient);
      color: #fff;
      border-radius: 20px;
      padding: 0.5rem 1.2rem;
    }
    .top-bar-nav .btn-current:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(232, 93, 38, 0.3);
    }

    /* --- Hero --- */
    .hero {
      text-align: center;
      padding: 6rem 2rem 4rem;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(232, 93, 38, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(0, 212, 255, 0.04) 0%, transparent 50%);
    }
    .hero h1 {
      font-family: 'Bebas Neue', 'Arial Narrow', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 400;
      color: var(--text-light);
      margin: 0 0 0.5rem;
      letter-spacing: 0.04em;
      line-height: 1;
    }
    .hero h1 span {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 1.15rem;
      max-width: 500px;
      margin: 0 auto;
      color: var(--text-muted);
    }

    /* --- Editions Grid --- */
    .editions-grid {
      flex: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;
      width: 100%;
    }
    .editions-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    /* --- Edition Card --- */
    .edition-card {
      background: var(--bg-card);
      border: 1px solid rgba(232, 93, 38, 0.15);
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .edition-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gradient);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }
    .edition-card:hover {
      transform: translateY(-8px);
      border-color: rgba(232, 93, 38, 0.4);
      box-shadow: 0 20px 50px rgba(232, 93, 38, 0.15);
    }
    .edition-card:hover::before { transform: scaleX(1); }

    .edition-card a {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .edition-thumb {
      width: 100%;
      height: 200px;
      object-fit: cover;
      filter: brightness(0.7) saturate(0.9);
      transition: all 0.4s ease;
    }
    .edition-card:hover .edition-thumb {
      filter: brightness(0.85) saturate(1);
    }

    .edition-info {
      padding: 1.5rem;
    }
    .edition-year {
      font-family: 'Bebas Neue', 'Arial Narrow', sans-serif;
      font-size: 2.5rem;
      color: var(--fire-orange);
      line-height: 1;
      margin-bottom: 0.3rem;
    }
    .edition-name {
      font-weight: 700;
      color: var(--text-light);
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }
    .edition-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      opacity: 0.8;
      line-height: 1.5;
    }
    .edition-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 1rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--fire-orange);
      transition: all 0.3s ease;
    }
    .edition-cta:hover {
      color: var(--accent);
      transform: translateX(4px);
    }
    .edition-cta::after {
      content: '→';
      transition: transform 0.3s ease;
    }
    .edition-card:hover .edition-cta::after {
      transform: translateX(4px);
    }

    /* --- Empty State --- */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
      opacity: 0.6;
      font-size: 1.1rem;
    }

    /* --- Footer --- */
    footer {
      border-top: 1px solid rgba(232, 93, 38, 0.15);
      background: rgba(13, 9, 7, 0.95);
      padding: 1.5rem 2rem;
      text-align: center;
    }
    .signature {
      font-size: 0.8rem;
      opacity: 0.7;
    }
    .signature a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .signature a:hover { color: var(--fire-orange); }

    /* --- Responsive --- */
    @media (max-width: 480px) {
      .hero { padding: 4rem 1.5rem 3rem; }
      .editions-list { grid-template-columns: 1fr; }
      .top-bar { padding: 0.8rem 1rem; }
      .top-bar-nav { gap: 0.5rem; }
      .top-bar-nav a { font-size: 0.8rem; }
    }

    /* --- Animations --- */
    @media (prefers-reduced-motion: no-preference) {
      .edition-card {
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInUp 0.6s ease-out forwards;
      }
      .edition-card:nth-child(1) { animation-delay: 0.1s; }
      .edition-card:nth-child(2) { animation-delay: 0.2s; }
      .edition-card:nth-child(3) { animation-delay: 0.3s; }
      .edition-card:nth-child(4) { animation-delay: 0.4s; }
      .edition-card:nth-child(5) { animation-delay: 0.5s; }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* --- Scrollbar --- */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1A1109; }
    ::-webkit-scrollbar-thumb { background: var(--gradient); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--fire-red); }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="/">
    <img src="/images/VALD.png" alt="Logo VALD" class="top-bar-logo">
  </a>
  <nav class="top-bar-nav">
    <a href="/ediciones/" aria-current="page" style="color: var(--accent);">Ediciones</a>
    <a href="/" class="btn-current">Edición Actual →</a>
  </nav>
</div>

<section class="hero">
  <h1>Ediciones <span>VALD</span></h1>
  <p>Archivo histórico de todas las ediciones de <strong>El Rey de la Montaña</strong></p>
</section>

<div class="editions-grid">
  <ul class="editions-list" id="editions-list">
    <!-- Editions are populated dynamically via JS below.
         To add a new edition, create a folder /ediciones/YYYY/ with an index.html.
         The script will detect it automatically. -->
  </ul>
  <div class="empty-state" id="empty-state" style="display:none;">
    No hay ediciones disponibles aún.
  </div>
</div>

<footer>
  <small class="signature">
    Landing construida por <a href="https://izignamx.com"><strong>IzignaMx</strong></a>
  </small>
</footer>

<script>
/**
 * VALD Editions Index — Dynamic Edition Discovery
 * 
 * Registry of editions. To add a new edition, add an entry here.
 * Each entry creates a card on the index page.
 * The script also tests each URL to confirm the page exists.
 */
const EDITIONS_REGISTRY = [
  {
    year: 2025,
    name: 'Vuelta a los Durmientes',
    description: '317 km · 4800 m de desnivel · Ultraciclismo autosuficiente',
    date: '16 de agosto 2025',
    thumb: '/images/valley.jpg',
    path: '/ediciones/2025/'
  }
  // Future editions: add entries here
  // {
  //   year: 2026,
  //   name: 'El Rey de la Montaña',
  //   description: 'Ciclismo de montaña',
  //   date: '06 de junio 2026',
  //   thumb: '/vald.jpg',
  //   path: '/ediciones/2026/'
  // }
];

function renderEditions() {
  const listEl = document.getElementById('editions-list');
  const emptyEl = document.getElementById('empty-state');

  if (EDITIONS_REGISTRY.length === 0) {
    emptyEl.style.display = 'block';
    return;
  }

  // Sort by year descending (newest first)
  const sorted = [...EDITIONS_REGISTRY].sort((a, b) => b.year - a.year);

  const fragment = document.createDocumentFragment();

  for (const edition of sorted) {
    const li = document.createElement('li');
    li.className = 'edition-card';
    li.innerHTML = `
      <a href="${edition.path}">
        <img class="edition-thumb"
             src="${edition.thumb}"
             alt="VALD ${edition.year}"
             loading="lazy"
             decoding="async"
             onerror="this.style.display='none'">
        <div class="edition-info">
          <div class="edition-year">${edition.year}</div>
          <div class="edition-name">${edition.name}</div>
          <div class="edition-meta">${edition.description}<br>${edition.date}</div>
          <span class="edition-cta">Ver edición</span>
        </div>
      </a>
    `;
    fragment.appendChild(li);
  }

  listEl.appendChild(fragment);
}

renderEditions();
</script>

</body>
</html>
